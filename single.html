<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/xxskidxx69420-ai/isthatagubbywebportheh/">  
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | IS THAT A GUBBY</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="loading-text" style="color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;">LOADING...</div>
    <div id="unity-container" class="unity-desktop" hidden>
      <canvas id="unity-canvas" width=960 height=600></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">IS THAT A GUBBY</div>
      </div>
    </div>
    
    <script>
      // File merging functions
      let totalBytes = 0;
      let loadedBytes = 0;
      let loadingText = document.querySelector("#loading-text");

      async function fetchWithProgress(url) {
        const response = await fetch(url);
        const reader = response.body.getReader();
        let chunks = [];
        let received = 0;
        while (true) {
          const {done, value} = await reader.read();
          if (done) break;
          received += value.length;
          loadedBytes += value.length;
          chunks.push(value);
          let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
          let mbTotal = '120.00'; // Approximate total size
          loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;
        }
        let fullBuffer = new Uint8Array(received);
        let offset = 0;
        for (let chunk of chunks) {
          fullBuffer.set(chunk, offset);
          offset += chunk.length;
        }
        return fullBuffer.buffer;
      }

      async function mergeFiles(fileParts, cacheKey) {
        const buffers = await Promise.all(
          fileParts.map(part => fetchWithProgress(part))
        );
        const mergedBlob = new Blob(buffers);
        return URL.createObjectURL(mergedBlob);
      }

      function getParts(file, start, end) {
        let parts = [];
        for (let i = start; i <= end; i++) {
          parts.push(file + ".part" + i);
        }
        return parts;
      }

      // Main execution
      (async () => {
        try {
          // Merge data file (2 parts)
          const dataUrl = await mergeFiles(
            getParts("./Build/webporboi1.data", 1, 2), 
            "webporboi1.data"
          );
          
          // Merge wasm file (3 parts)
          const codeUrl = await mergeFiles(
            getParts("./Build/webporboi1.wasm", 1, 3), 
            "webporboi1.wasm"
          );

          // Show the container
          var container = document.querySelector("#unity-container");
          container.hidden = false;
          var canvas = document.querySelector("#unity-canvas");
          var loadingBar = document.querySelector("#unity-loading-bar");
          var progressBarFull = document.querySelector("#unity-progress-bar-full");
          var fullscreenButton = document.querySelector("#unity-fullscreen-button");
          var warningBanner = document.querySelector("#unity-warning");

          function unityShowBanner(msg, type) {
            function updateBannerVisibility() {
              warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
            }
            var div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type == 'error') div.style = 'background: red; padding: 10px;';
            else {
              if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
              setTimeout(function() {
                warningBanner.removeChild(div);
                updateBannerVisibility();
              }, 5000);
            }
            updateBannerVisibility();
          }

          var buildUrl = "Build";
          var loaderUrl = buildUrl + "/webporboi.loader.js";
          
          var config = {
            dataUrl: dataUrl,  // Use merged data URL
            frameworkUrl: buildUrl + "/webporboi1.framework.js",
            codeUrl: codeUrl,  // Use merged wasm URL
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "IS THAT A GUBBY",
            productVersion: "2.2",
            showBanner: unityShowBanner,
          };

          if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);
            container.className = "unity-mobile";
            canvas.className = "unity-mobile";
            unityShowBanner('WEBPORT BY CARTERYES.');
          } else {
            canvas.style.width = "960px";
            canvas.style.height = "600px";
          }

          loadingBar.style.display = "block";

          var script = document.createElement("script");
          script.src = loaderUrl;
          script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
              progressBarFull.style.width = 100 * progress + "%";
            }).then((unityInstance) => {
              loadingText.remove();
              loadingBar.style.display = "none";
              fullscreenButton.onclick = () => {
                unityInstance.SetFullscreen(1);
              };
            }).catch((message) => {
              alert(message);
            });
          };
          document.body.appendChild(script);
        } catch (error) {
          console.error("Error loading game:", error);
          loadingText.textContent = "ERROR LOADING: " + error.message;
        }
      })();
    </script>
  </body>
</html>
